worker_processes auto;
error_log C:/nginx/nginx-1.26.2/logs/error.log warn;
pid C:/nginx/nginx-1.26.2/logs/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       C:/nginx/nginx-1.26.2/conf/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log C:/nginx/nginx-1.26.2/logs/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Backend upstream - least connections load balancing
    upstream backend {
        least_conn;
        server 127.0.0.1:2010 max_fails=3 fail_timeout=30s;
        server 127.0.0.1:2011 max_fails=3 fail_timeout=30s;
        server 127.0.0.1:2012 max_fails=3 fail_timeout=30s;
    }

    server {
        listen 80;
        server_name _;

        # Frontend: Admin
        location /admin/ {
            alias J:/work/mimo-code/exercises/PropertyManagementSystem/01-项目源码/frontend-admin/dist/;
            try_files $uri $uri/ /admin/index.html;

            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 30d;
                add_header Cache-Control "public, immutable";
            }
        }

        # Frontend: Client
        location /client/ {
            alias J:/work/mimo-code/exercises/PropertyManagementSystem/01-项目源码/frontend-client/dist/;
            try_files $uri $uri/ /client/index.html;

            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 30d;
                add_header Cache-Control "public, immutable";
            }
        }

        # System Monitor
        location /monitor/ {
            alias J:/work/mimo-code/exercises/PropertyManagementSystem/05-系统监控/;
            try_files $uri $uri/ /monitor/index.html;
        }

        # API index
        location = /api {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # API proxy with failover
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
            proxy_send_timeout 10s;

            # Auto-failover: on error, try next upstream
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
            proxy_next_upstream_timeout 10s;
        }

        # Swagger UI
        location /swagger-ui/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        # OpenAPI docs
        location /v3/api-docs {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        # File uploads proxy
        location /resources/uploads/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Actuator health check (internal only)
        location /actuator/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
        }

        # Monitor: individual backend health (no auth, no CORS restriction)
        location /monitor/health/ {
            proxy_pass http://backend/actuator/health;
            proxy_set_header Host $host;
        }

        location /monitor/health/1/ {
            proxy_pass http://127.0.0.1:2010/actuator/health;
            proxy_set_header Host $host;
        }

        location /monitor/health/2/ {
            proxy_pass http://127.0.0.1:2011/actuator/health;
            proxy_set_header Host $host;
        }

        location /monitor/health/3/ {
            proxy_pass http://127.0.0.1:2012/actuator/health;
            proxy_set_header Host $host;
        }

        location /monitor/metrics/1/ {
            proxy_pass http://127.0.0.1:2010/actuator/metrics;
            proxy_set_header Host $host;
        }

        location /monitor/metrics/2/ {
            proxy_pass http://127.0.0.1:2011/actuator/metrics;
            proxy_set_header Host $host;
        }

        location /monitor/metrics/3/ {
            proxy_pass http://127.0.0.1:2012/actuator/metrics;
            proxy_set_header Host $host;
        }

        location ~ ^/monitor/metrics/(\d+)/([\w.]+)$ {
            proxy_pass http://127.0.0.1:201$1/actuator/metrics/$2;
            proxy_set_header Host $host;
        }

        # Default: redirect to admin
        location = / {
            return 302 /admin/;
        }
    }
}
